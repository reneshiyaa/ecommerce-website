<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-black text-white p-4 flex justify-between">
  <h1 class="text-xl font-bold">MyShop</h1>
  <div>
    <a href="index.html" class="mx-2">Home</a>
    <a href="cart.html" class="mx-2">Cart 🛒</a>
  </div>
</nav>

<h2 class="text-center text-3xl mt-6 font-bold">Our Products</h2>

<!-- Product Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-8 p-8">

  <!-- Shoes -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
         class="w-full h-60 object-cover rounded">
    <h3 class="text-xl mt-3">Running Shoes</h3>
    <p class="text-lg font-semibold">₹999</p>
    <button onclick="addToCart('Running Shoes',999)">
      Add to Cart
    </button>
  </div>

  <!-- Watch -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30"
         class="w-full h-60 object-cover rounded">
    <h3 class="text-xl mt-3">Smart Watch</h3>
    <p class="text-lg font-semibold">₹1999</p>
    <button onclick="addToCart('Smart Watch',1999)">
      Add to Cart
    </button>
  </div>

  <!-- Headphones -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1518449032759-7f9b6bdb5b44"
         class="w-full h-60 object-cover rounded">
    <h3 class="text-xl mt-3">Wireless Headphones</h3>
    <p class="text-lg font-semibold">₹1499</p>
    <button onclick="addToCart('Wireless Headphones',1499)">
      Add to Cart
    </button>
  </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
