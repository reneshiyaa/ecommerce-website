<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-black text-white p-4 flex justify-between">
  <h1 class="text-xl font-bold">MyShop</h1>
  <a href="products.html">← Back to Products</a>
</nav>

<h2 class="text-center text-3xl mt-6 font-bold">Your Cart</h2>

<ul id="cart-items" class="p-6"></ul>

<h3 id="total" class="text-center text-xl font-bold"></h3>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let list = document.getElementById("cart-items");
let total = 0;

cart.forEach(item => {
  let li = document.createElement("li");
  li.className = "bg-white p-4 m-2 shadow rounded";
  li.textContent = item.name + " - ₹" + item.price;
  list.appendChild(li);
  total += item.price;
});

document.getElementById("total").textContent = "Total: ₹" + total;
</script>

</body>
</html>
